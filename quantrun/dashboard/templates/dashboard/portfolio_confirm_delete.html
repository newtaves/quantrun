{% extends "dashboard/base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">Delete Portfolio</div>
            <div class="card-body text-center">
                <p class="mb-2">Are you sure you want to delete <strong>{{ portfolio.name }}</strong>?</p>
                <p class="text-muted small mb-3">This action cannot be undone.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2 justify-content-center">
                        <button type="submit" class="btn btn-danger">Delete</button>
                        <a href="{% url 'portfolio_detail' portfolio.id %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
